<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Chat App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero {
            text-align: center;
            color: white;
        }
        .btn-custom {
            background-color: #ffa900;
            border-color: #ffa900;
        }
        .btn-custom:hover {
            background-color: #e69500;
            border-color: #e69500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1 class="display-4">Welcome to Flask Chat App</h1>
            <p class="lead">Connect and chat with others in real-time.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('login') }}" class="btn btn-light btn-lg">Log In</a>
                <a href="{{ url_for('signup') }}" class="btn btn-custom btn-lg">Sign Up</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</body>
</html>
